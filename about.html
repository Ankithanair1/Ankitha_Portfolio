<!DOCTYPE html>
<html>
<head>
    <title>Landing Page</title>
    <style>
        body { margin: 0; font-family: Arial; }
        nav { background: black; color: white; padding: 10px; }
        .hero {
            height: 90vh;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        button {
            padding: 10px 20px;
            border: none;
            background: white;
            color: black;
            cursor: pointer;
        }
    </style>
</head>
<body>

<nav>My Website</nav>

<div class="hero">
    <h1>Welcome to My Site</h1>
    <button>Get Started</button>
</div>

</body>
</html>
